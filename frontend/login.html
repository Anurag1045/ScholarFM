<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign in — ScholarFM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070f;--surface:#0f0f1a;--surface2:#14141f;--border:#1c1c2e;
  --purple:#7c6aff;--pink:#ff6a94;--text:#f0f0f8;--muted:#6b6b8a;--muted2:#3a3a55;
  --error:#ff4d6d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* Background blobs */
.bg-blob{position:fixed;pointer-events:none;border-radius:50%;filter:blur(80px);opacity:.15;}
.blob1{width:500px;height:500px;background:var(--purple);top:-100px;left:-100px;}
.blob2{width:400px;height:400px;background:var(--pink);bottom:-100px;right:-100px;}

/* Nav */
nav{
  padding:0 32px;height:60px;display:flex;align-items:center;
  border-bottom:1px solid var(--border);position:relative;z-index:10;
}
.nav-logo{font-size:18px;font-weight:800;}
.nav-logo span{color:var(--purple);}
.nav-back{margin-left:auto;font-size:13px;color:var(--muted);cursor:pointer;transition:color .15s;}
.nav-back:hover{color:var(--text);}

/* Main layout */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 24px;position:relative;z-index:10;
}
.auth-container{width:100%;max-width:420px;}

/* Card */
.auth-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:36px;
}
.auth-heading{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:28px;}

/* Google button */
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:13px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:15px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;margin-bottom:20px;
}
.btn-google:hover{border-color:var(--muted2);background:#1a1a2a;}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--muted);}

/* Form */
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:7px;}
.field input{
  width:100%;padding:12px 14px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--purple);}
.field input::placeholder{color:var(--muted2);}

.btn-submit{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:var(--purple);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;margin-top:4px;
  box-shadow:0 0 20px #7c6aff33;
}
.btn-submit:hover{background:#6a58e8;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

/* Toggle */
.auth-toggle{text-align:center;margin-top:20px;font-size:14px;color:var(--muted);}
.auth-toggle button{
  background:none;border:none;color:var(--purple);font-weight:600;
  cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;
}
.auth-toggle button:hover{text-decoration:underline;}

/* Error */
.err-msg{
  background:#ff4d6d18;border:1px solid #ff4d6d44;border-radius:8px;
  padding:10px 14px;font-size:13px;color:#ff7a94;margin-bottom:14px;
  display:none;
}
.err-msg.visible{display:block;}

/* Success */
.success-msg{
  background:#22c55e18;border:1px solid #22c55e44;border-radius:8px;
  padding:10px 14px;font-size:13px;color:#4ade80;margin-bottom:14px;
  display:none;
}
.success-msg.visible{display:block;}

/* Loading spinner */
.spinner{
  display:inline-block;width:16px;height:16px;border:2px solid #fff4;
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>

<nav>
  <div class="nav-logo">Scholar<span>FM</span></div>
  <div class="nav-back" onclick="location.href='index.html'">← Back to home</div>
</nav>

<main>
  <div class="auth-container">
    <div class="auth-card">

      <h1 class="auth-heading" id="heading">Welcome back</h1>
      <p class="auth-sub" id="subheading">Sign in to your ScholarFM account</p>

      <div class="err-msg" id="errMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- Google -->
      <button class="btn-google" onclick="signInGoogle()">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.1-4.4 6.7l7 5.4C43.1 37 46.1 31.2 46.1 24.5z"/><path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 019.5 24c0-1.6.3-3.2.9-4.6l-7.8-6A23.9 23.9 0 000 24c0 3.8.9 7.4 2.7 10.5l7.8-5.9z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7-5.4c-2.1 1.4-4.8 2.2-8.5 2.2-6.2 0-11.5-4.2-13.4-9.8l-7.8 5.9C6.6 42.6 14.6 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div class="divider"><span>or continue with email</span></div>

      <!-- Name field (signup only) -->
      <div class="field" id="nameField" style="display:none">
        <label>Full name</label>
        <input type="text" id="nameInput" placeholder="Your name"/>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="emailInput" placeholder="you@example.com"/>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()"/>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitAuth()">
        Sign in
      </button>

      <div class="auth-toggle" id="toggle">
        Don't have an account? <button onclick="switchMode()">Create one free</button>
      </div>

    </div>
  </div>
</main>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ── PASTE YOUR FIREBASE CONFIG HERE ───────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBMj1pVHHDVNJPRYN-QlrLQ51GQEs8WQV0",
  authDomain: "scholarfm-c5a6d.firebaseapp.com",
  projectId: "scholarfm-c5a6d",
  storageBucket: "scholarfm-c5a6d.firebasestorage.app",
  messagingSenderId: "609436158841",
  appId: "1:609436158841:web:da83287d15509735f3bda8"
};
// ──────────────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let isSignup = new URLSearchParams(location.search).get('mode') === 'signup';
const plan = new URLSearchParams(location.search).get('plan') || 'free';

function applyMode() {
  document.getElementById('heading').textContent = isSignup ? 'Create your account' : 'Welcome back';
  document.getElementById('subheading').textContent = isSignup
    ? 'Start listening to research for free'
    : 'Sign in to your ScholarFM account';
  document.getElementById('submitBtn').textContent = isSignup ? 'Create account' : 'Sign in';
  document.getElementById('nameField').style.display = isSignup ? '' : 'none';
  document.getElementById('toggle').innerHTML = isSignup
    ? 'Already have an account? <button onclick="window.switchMode()">Sign in</button>'
    : "Don't have an account? <button onclick=\"window.switchMode()\">Create one free</button>";
}
applyMode();

window.switchMode = () => { isSignup = !isSignup; applyMode(); clearMessages(); };

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('successMsg').classList.remove('visible');
}
function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('errMsg').classList.remove('visible');
}
function clearMessages() {
  document.getElementById('errMsg').classList.remove('visible');
  document.getElementById('successMsg').classList.remove('visible');
}

function setLoading(on) {
  const btn = document.getElementById('submitBtn');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Please wait…' : (isSignup ? 'Create account' : 'Sign in');
}

function afterAuth() {
  showSuccess('✓ Logged in! Redirecting…');
  setTimeout(() => { location.href = 'app.html'; }, 800);
}

window.signInGoogle = async () => {
  clearMessages();
  try {
    await signInWithPopup(auth, provider);
    afterAuth();
  } catch (e) {
    showErr(friendlyError(e.code));
  }
};

window.submitAuth = async () => {
  clearMessages();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  if (!email || !password) { showErr('Please fill in all fields.'); return; }
  if (password.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  setLoading(true);
  try {
    if (isSignup) {
      await createUserWithEmailAndPassword(auth, email, password);
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
    afterAuth();
  } catch (e) {
    setLoading(false);
    showErr(friendlyError(e.code));
  }
};

function friendlyError(code) {
  const map = {
    'auth/user-not-found': 'No account with that email. Did you mean to sign up?',
    'auth/wrong-password': 'Incorrect password. Try again.',
    'auth/email-already-in-use': 'That email is already registered. Sign in instead.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
    'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

// If already logged in, go to app
onAuthStateChanged(auth, (user) => {
  if (user) location.href = 'app.html';
});
</script>
</body>
</html>
