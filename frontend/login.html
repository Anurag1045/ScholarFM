<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign in — ScholarFM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07070f;--s1:#0d0d1a;--s2:#121220;--border:#1e1e32;--border2:#2a2a42;--purple:#7c6aff;--purple2:#9d8fff;--pdim:#7c6aff18;--pink:#ff6a94;--text:#f0f0fc;--muted:#7070a0;--muted2:#3a3a5a;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
a{text-decoration:none;color:inherit;}
button{font-family:'Inter',sans-serif;}

nav{padding:0 5%;height:68px;display:flex;align-items:center;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:32px;height:32px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.logo-text span{color:var(--purple2);}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden;}
.bg-orb{position:absolute;pointer-events:none;border-radius:50%;filter:blur(100px);}
.o1{width:500px;height:500px;background:#7c6aff;opacity:.06;top:-100px;right:-100px;}
.o2{width:400px;height:400px;background:#ff6a94;opacity:.04;bottom:-100px;left:-100px;}

.auth-card{
  width:100%;max-width:400px;
  background:var(--s1);border:1px solid var(--border);border-radius:20px;
  padding:36px;position:relative;z-index:1;
  box-shadow:0 40px 80px rgba(0,0,0,.5);
}
.card-header{text-align:center;margin-bottom:28px;}
.card-header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;}
.card-header p{font-size:14px;color:var(--muted);}

.btn-google{
  width:100%;padding:13px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text);font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s;margin-bottom:20px;
}
.btn-google:hover{border-color:var(--muted2);background:rgba(255,255,255,.04);}
.google-icon{width:18px;height:18px;}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--muted2);font-weight:500;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
.field input{
  width:100%;padding:12px 14px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .15s;
}
.field input:focus{border-color:rgba(124,106,255,.5);}
.field input::placeholder{color:var(--muted2);}

.btn-auth{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:var(--purple);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;margin-top:4px;
  box-shadow:0 0 20px rgba(124,106,255,.3);
}
.btn-auth:hover{background:#6a58e8;transform:translateY(-1px);}
.btn-auth:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.switch-mode{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
.switch-mode a{color:var(--purple2);font-weight:600;cursor:pointer;}
.switch-mode a:hover{text-decoration:underline;}

.error-box{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;
  margin-bottom:16px;display:none;
}
.error-box.show{display:block;}

.name-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="location.href='index.html'">
    <div class="logo-mark">S</div>
    <div class="logo-text">Scholar<span>FM</span></div>
  </div>
</nav>

<div class="page">
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
  <div class="auth-card">
    <div class="card-header">
      <h1 id="card-title">Welcome back</h1>
      <p id="card-sub">Sign in to your ScholarFM account</p>
    </div>

    <div id="error-box" class="error-box"></div>

    <button class="btn-google" id="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <div id="signup-name-fields" class="name-fields" style="display:none;">
      <div class="field">
        <label>First name</label>
        <input type="text" id="fname" placeholder="Alex"/>
      </div>
      <div class="field">
        <label>Last name</label>
        <input type="text" id="lname" placeholder="Smith"/>
      </div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@university.edu"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="btn-auth" id="btn-auth">Sign in</button>

    <div class="switch-mode">
      <span id="switch-text">Don't have an account?</span>
      <a id="switch-link" onclick="toggleMode()"> Sign up free</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMj1pVHHDVNJPRYN-QlrLQ51GQEs8WQV0",
  authDomain: "scholarfm-c5a6d.firebaseapp.com",
  projectId: "scholarfm-c5a6d",
  storageBucket: "scholarfm-c5a6d.firebasestorage.app",
  messagingSenderId: "609436158841",
  appId: "1:609436158841:web:da83287d15509735f3bda8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let isSignup = new URLSearchParams(window.location.search).get('mode') === 'signup';
if (isSignup) applySignupMode();

function applySignupMode() {
  isSignup = true;
  document.getElementById('card-title').textContent = 'Create your account';
  document.getElementById('card-sub').textContent = 'Start listening to research papers today';
  document.getElementById('btn-auth').textContent = 'Create account';
  document.getElementById('switch-text').textContent = 'Already have an account?';
  document.getElementById('switch-link').textContent = ' Sign in';
  document.getElementById('signup-name-fields').style.display = 'grid';
}

window.toggleMode = function() {
  isSignup = !isSignup;
  clearError();
  if (isSignup) {
    document.getElementById('card-title').textContent = 'Create your account';
    document.getElementById('card-sub').textContent = 'Start listening to research papers today';
    document.getElementById('btn-auth').textContent = 'Create account';
    document.getElementById('switch-text').textContent = 'Already have an account?';
    document.getElementById('switch-link').textContent = ' Sign in';
    document.getElementById('signup-name-fields').style.display = 'grid';
  } else {
    document.getElementById('card-title').textContent = 'Welcome back';
    document.getElementById('card-sub').textContent = 'Sign in to your ScholarFM account';
    document.getElementById('btn-auth').textContent = 'Sign in';
    document.getElementById('switch-text').textContent = "Don't have an account?";
    document.getElementById('switch-link').textContent = ' Sign up free';
    document.getElementById('signup-name-fields').style.display = 'none';
  }
};

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('error-box').classList.remove('show');
}

function friendlyError(code) {
  const map = {
    'auth/user-not-found': 'No account found with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
    'auth/invalid-credential': 'Incorrect email or password.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

document.getElementById('btn-google').addEventListener('click', async () => {
  clearError();
  try {
    await signInWithPopup(auth, provider);
    location.href = 'app.html';
  } catch(e) {
    showError(friendlyError(e.code));
  }
});

document.getElementById('btn-auth').addEventListener('click', async () => {
  clearError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showError('Please fill in all fields.'); return; }
  const btn = document.getElementById('btn-auth');
  btn.disabled = true;
  btn.textContent = isSignup ? 'Creating account…' : 'Signing in…';
  try {
    if (isSignup) {
      const fname = document.getElementById('fname').value.trim();
      const lname = document.getElementById('lname').value.trim();
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      if (fname || lname) await updateProfile(cred.user, { displayName: `${fname} ${lname}`.trim() });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
    location.href = 'app.html';
  } catch(e) {
    showError(friendlyError(e.code));
    btn.disabled = false;
    btn.textContent = isSignup ? 'Create account' : 'Sign in';
  }
});

['email','password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if(e.key==='Enter') document.getElementById('btn-auth').click();
  });
});
</script>
</body>
</html>
